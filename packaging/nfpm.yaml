name: pg-rds-proxy
arch: amd64
platform: linux
version: ${VERSION}
section: admin
priority: optional
maintainer: NetTantra <ops@nettantra.example>
description: |
  Virtualmin/Webmin compatibility proxy for Amazon RDS PostgreSQL.
  Rewrites pg_shadow and pg_authid references at the wire protocol level
  so unmodified Webmin/Virtualmin installations work against RDS.
vendor: NetTantra
homepage: https://github.com/nettantra/pg-rds-proxy
license: TBD

contents:
  - src: ./bin/pg-rds-proxy.linux-amd64
    dst: /usr/bin/pg-rds-proxy
    file_info:
      mode: 0755

  - src: ./packaging/pg-rds-proxy.service
    dst: /lib/systemd/system/pg-rds-proxy.service
    file_info:
      mode: 0644

  - src: ./packaging/pg-rds-proxy.conf
    dst: /etc/pg-rds-proxy/pg-rds-proxy.conf
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: pg-rds-proxy

scripts:
  postinstall: ./packaging/postinstall.sh
  preremove: ./packaging/preremove.sh
  postremove: ./packaging/postremove.sh
