# pg-rds-proxy configuration file
#
# Format: KEY=VALUE, one per line. Blank lines and lines starting with `#`
# are ignored. Real environment variables and CLI flags override any value
# set here.
#
# The daemon reads this file from /etc/pg-rds-proxy/pg-rds-proxy.conf by
# default; override with `--config <path>` or `PGRP_CONFIG=<path>`.

# Address the proxy binds to for Webmin/Virtualmin to connect to.
PGRP_LISTEN=127.0.0.1:5532

# RDS endpoint: host:port
#PGRP_UPSTREAM=mydb.cluster-xxxx.us-east-1.rds.amazonaws.com:5432

# TLS mode to upstream: disable | require | verify-full
PGRP_UPSTREAM_TLS=require

# Log level: debug | info | warn | error
PGRP_LOG_LEVEL=info

# Set to any non-empty value to log every rewritten statement.
#PGRP_LOG_REWRITES=1

# When set to any non-empty value, after every CREATE ROLE / CREATE USER the
# proxy runs `GRANT <newrole> TO <connecting user>` on the same backend
# connection. Required on Amazon RDS so the master user can subsequently run
# CREATE DATABASE ... OWNER=<newrole> without hitting
# "must be able to SET ROLE" errors. Recommended for Webmin/Virtualmin setups.
PGRP_AUTO_GRANT_ROLES=1

# When set to any non-empty value, the proxy intercepts DROP DATABASE
# statements and first runs `SELECT pg_terminate_backend(pid) FROM
# pg_stat_activity WHERE datname = '<target>' AND pid <> pg_backend_pid()` on
# the same backend connection so the DROP doesn't fail because of leftover
# sessions. Recommended for Webmin/Virtualmin, which routinely deletes
# databases as part of domain teardown. The proxy's session is excluded.
PGRP_AUTO_TERMINATE_ON_DROP=1
